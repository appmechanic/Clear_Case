name: clearcase
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+3

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.5.4
  firebase_auth: ^6.1.4
  flutter_svg: ^2.2.3
  intl: ^0.20.2
  table_calendar: ^3.2.0
  cloud_firestore: ^6.1.2
  dropdown_button2: ^2.3.9
  dotted_border: ^3.1.0
  image_picker: ^1.2.1
  file_picker: ^10.3.10
  firebase_storage: ^13.1.0
  image_cropper: ^11.0.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  firebase_messaging: ^16.1.3
  firebase_core: ^4.6.0
  flutter_local_notifications: ^17.2.1
  flutter_timezone: ^5.0.2
  pdf: ^3.12.0
  printing: ^5.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/image (3).png"
  min_sdk_android: 21

flutter:

  generate: true
  uses-material-design: true

  fonts:
    - family: Jost
      fonts:
        - asset: assets/fonts/Jost.ttf

  assets:
    - assets/images/
    - assets/icons/
